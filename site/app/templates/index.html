<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Gen - Procedural Planet Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden flex">

    <!-- Sidebar UI -->
    <aside class="w-80 bg-gray-800 p-6 flex flex-col gap-6 z-10 shadow-xl border-r border-gray-700">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">World Gen</h1>
            <p class="text-sm text-gray-400">Real-time procedural planets</p>
        </div>

        <div class="flex flex-col gap-4">
            <div>
                <label class="block text-sm mb-1">Seed</label>
                <input type="number" id="seed" value="42" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm mb-1">Radius (Noise Scale)</label>
                <div class="flex items-center gap-3">
                    <input type="range" id="radius" min="1" max="50" value="2" class="w-2/3">
                    <input type="number" id="radiusNum" min="1" max="50" value="2" class="w-1/3 bg-gray-700 rounded px-2 py-1 text-white outline-none focus:ring-2 focus:ring-blue-500 text-center">
                </div>
            </div>

            <div>
                <label class="block text-sm mb-1">Subdivisions (1-6)</label>
                <input type="range" id="subdivisions" min="1" max="8" value="6" class="w-full">
            </div>

            <div>
                <label class="block text-sm mb-1">Noise scale</label>
                <input type="number" id="noise_scale" value="2" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Octaves</label>
                <input type="number" id="octaves" value="4" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Persistence</label>
                <input type="number" id="persistence" value="0.45" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Lacunarity</label>
                <input type="number" id="lacunarity" value="2" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Amplitude</label>
                <input type="number" id="amplitude" value="20" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Water level</label>
                <input type="number" id="water_level" value="0.33" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Sharpness strength</label>
                <input type="number" id="sharpness_strength" value="5" class="w-full bg-gray-700 rounded px-3 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button id="generateBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition-colors mt-2">
                Generate Planet
            </button>
        </div>

        <div class="mt-auto">
            <h3 class="text-sm font-semibold mb-2 text-gray-400">Status:</h3>
            <div id="statusText" class="text-sm text-green-400">Ready</div>
        </div>
    </aside>

    <!-- 3D Canvas Container -->
    <main class="flex-1 relative" id="canvas-container">
        <!-- Three.js canvas will be injected here -->
    </main>

    <!-- Scripts -->
    <script type="module" src="{{ url_for('static', filename='js/scene.js') }}?v=3"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}?v=3"></script>
</body>
</html>
